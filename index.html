<!DOCTYPE html>
<html>

<head>
    <title>My Plant Shop 🌿</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #d4fc79, #96e6a1);
        }

        h1 {
            color: green;
        }

        .plant {
            border: 2px solid green;
            margin: 20px;
            padding: 10px;
            display: inline-block;
            border-radius: 10px;
            background: white;
        }

        .plant:hover {
            transform: scale(1.1);
            transition: 0.3s;
        }

        button {
            background: green;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h1>🌱 My Plant Shop 🌱</h1>
<p>Welcome! Choose your favorite plant 🌸</p>

<div class="plant">
    <h3>🌵 Cactus</h3>
    <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6" width="100">
    <p>Easy to care</p>
    <button onclick="buyPlant('Cactus')">Buy</button>
</div>

<div class="plant">
    <h3>🌸 Flower</h3>
    <img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946" width="100">
    <p>Very beautiful</p>
    <button onclick="buyPlant('Flower')">Buy</button>
</div>

<div class="plant">
    <h3>🍃 Money Plant</h3>
    <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6" width="100">
    <p>Good luck plant</p>
    <button onclick="buyPlant('Money Plant')">Buy</button>
</div>

<script>
function buyPlant(name) {
    alert("You bought a " + name + " 🌿");
}
</script>

</body>
</html>
<div class="plant">
    <h3>🌹 Rose</h3>
    <img src="https://images.unsplash.com/photo-1518895949257-7621c3c786d7" width="100">
    <p>Beautiful and romantic</p>
    <button onclick="buyPlant('Rose')">Buy</button>
</div>

<div class="plant">
    <h3>🌻 Sunflower</h3>
    <img src="https://images.unsplash.com/photo-1470509037663-253afd7f0f51" width="100">
    <p>Bright and happy</p>
    <button onclick="buyPlant('Sunflower')">Buy</button>
</div>

<div class="plant">
    <h3>🌿 Aloe Vera</h3>
    <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6" width="100">
    <p>Good for skin care</p>
    <button onclick="buyPlant('Aloe Vera')">Buy</button>
</div>
