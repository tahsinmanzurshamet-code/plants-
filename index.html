<!DOCTYPE html>
<html>
<head>
<title>Plant Shop</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f2ed;
}

/* Hide shop initially */
#shop {
    display: none;
}

button {
    margin: 10px;
    padding: 10px 20px;
    border: 1px solid black;
    background: none;
    cursor: pointer;
}

button:hover {
    background: black;
    color: white;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    padding: 20px;
}

.plant {
    border: 1px solid green;
    padding: 10px;
    background: white;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="home">
    <h1>🌿 Welcome to Studio Verde</h1>
    <button onclick="enterShop()">Enter Shop</button>
</div>

<!-- PAGE 2 -->
<div id="shop">
    <h1>🌱 Choose Your Plant</h1>

    <button onclick="goBack()">⬅ Back</button>

    <div class="grid">
        <div class="plant">🌵 Cactus <button onclick="buy('Cactus')">Buy</button></div>
        <div class="plant">🌸 Rose <button onclick="buy('Rose')">Buy</button></div>
        <div class="plant">🌻 Sunflower <button onclick="buy('Sunflower')">Buy</button></div>
        <div class="plant">🍃 Money Plant <button onclick="buy('Money Plant')">Buy</button></div>
        <div class="plant">🌿 Aloe Vera <button onclick="buy('Aloe Vera')">Buy</button></div>
        <div class="plant">🌼 Daisy <button onclick="buy('Daisy')">Buy</button></div>
        <div class="plant">🌺 Hibiscus <button onclick="buy('Hibiscus')">Buy</button></div>
        <div class="plant">🌳 Bonsai <button onclick="buy('Bonsai')">Buy</button></div>
        <div class="plant">🍀 Clover <button onclick="buy('Clover')">Buy</button></div>
        <div class="plant">🌷 Tulip <button onclick="buy('Tulip')">Buy</button></div>
    </div>
</div>

<script>
function enterShop() {
    document.getElementById("home").style.display = "none";
    document.getElementById("shop").style.display = "block";
}

function goBack() {
    document.getElementById("shop").style.display = "none";
    document.getElementById("home").style.display = "block";
}

function buy(name){
    alert(name + " added 🌿");
}
</script>

</body>
</html>
